<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <nav>Registration for the site.</nav>
    <div class="container">
      <p>Name</p>
      <div>
        <textarea name="Name" id="name">Enter your name: </textarea>
        <p>Email</p>
        <div class="email">
          <textarea name="Email" id="Email">Enter your email: </textarea>
        </div>
        <p>Age</p>
        <div class="age">
          <textarea name="age" id="age">Enter your age: </textarea>
        </div>
        <p>Which option best describes you?</p>
        <div class="description">
          <select name="description" id="description">
            <option value="student">student</option>
            <option value="teacher">teacher</option>
          </select>
        </div>
        <p>Any suggestions?</p>
        <div id="suggestions">
          <textarea name="suggestions" id="suggestions">
Type your suggestions here:</textarea
          >
        </div>
        <div class="button">
          <button id="submit">Submit</button>
        </div>
      </div>
    </div>
  </body>
</html>
