<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forum</title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <nav>Login forum.</nav>
    <form id="form">
      <div class="container-1">
        <div class="container-2">
          <label class="labeli-1" for="name">name</label>
          <input type="text" name="" id="name" />

          <label for="email">email</label>
          <input type="email " name="email" id="email" />

          <label for="age">age</label>
          <input type="number" name="age" id="age" />

          <label for="description">Which option best describes you? </label>
          <select name="description" id="description">
            <option value="student">student</option>
            <option value="teacher">teacher</option>
          </select>

          <label for="recommendation"
            >Would you recommend this site to a friend?
          </label>
          <input type="checkbox" id="yes" name="recommendation" value="yes">
<label for="yes">Yes</label>
<input type="checkbox" id="no" name="recommendation" value="no">
<label for="no">No</label>
input type="checkbox" id="maybe" name="recommendation" value="maybe">
<label for="maybe">Maybe</label>

          <label for="languages-frameworks"
            >Languages and Frameworks known.
          </label>
          <input type="checkbox" name="C#" id="C#" />C#
          <input type="checkbox" name="C++" id="C++" />C++
          <input type="checkbox" name="Java" id="Java" />Java
          <input type="checkbox" name="Python" id="Python" />Python
          <input type="checkbox" name="Javascript" id="Javascript" />Javascript
          <input type="checkbox" name="React" id="React" />React

          <label for="comments-suggestions"
            >Any comments or suggestions.
          </label>
          <textarea name="comments-suggestions" id="comments-suggestions">
Enter your comment here </textarea
          >
          <button id="submit">Submit</button>
        </div>
      </div>
    </form>
    <footer>
      <p id="signature">Made by Emirski :D</p>
    </footer>
  </body>
</html>
